name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck, Test, Doctor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript typecheck
        if: ${{ !cancelled() }}
        run: npm run typecheck

      - name: Unit tests (utils)
        if: ${{ !cancelled() }}
        run: npm run test:ci

      # Non-blocking: surfaces config/version warnings (vd patch drift so với SDK)
      # mà không chặn merge. Bỏ continue-on-error nếu muốn doctor là gate cứng.
      - name: Expo Doctor
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: npx --yes expo-doctor
