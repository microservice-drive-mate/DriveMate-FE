name: EAS Update (OTA)

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Select the OTA release channel'
        required: true
        type: choice
        options:
          - preview
          - production
      message:
        description: 'Update message or release notes'
        required: true
        type: string

jobs:
  update:
    name: Publish OTA to ${{ github.event.inputs.channel }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update
        run: eas update --branch ${{ github.event.inputs.channel }} --message "${{ github.event.inputs.message }}" --non-interactive
